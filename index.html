<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nikito$</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body, html {
      height: 100%;
      overflow: hidden;
      color: #eaf6ff;
    }

    .video-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: blur(12px) brightness(0.5) saturate(1.2);
      z-index: -2;
    }

    .overlay {
      position: fixed;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(0, 191, 255, 0.2), rgba(0,0,0,0.7));
      z-index: -1;
    }

    .container {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      animation: fadeIn 1.5s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card {
      backdrop-filter: blur(15px);
      background: rgba(10, 25, 40, 0.5);
      padding: 45px;
      border-radius: 25px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 0 30px rgba(0,191,255,0.3);
      transition: 0.3s ease;
    }

    .card:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 0 50px rgba(0,191,255,0.5);
    }

    .avatar {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 20px;
      border: 3px solid rgba(0,191,255,0.6);
      transition: 0.3s ease;
    }

    .avatar:hover {
      transform: scale(1.08) rotate(1deg);
      box-shadow: 0 0 20px rgba(0,191,255,0.7);
    }

    h1 {
      font-size: 30px;
      margin-bottom: 10px;
      color: #7fdfff;
    }

    p {
      font-size: 14px;
      opacity: 0.85;
      line-height: 1.6;
      margin-bottom: 25px;
    }

    .socials {
      display: flex;
      justify-content: center;
      gap: 15px;
    }

    .socials a {
      text-decoration: none;
      color: #7fdfff;
      font-size: 18px;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid rgba(127,223,255,0.3);
      transition: 0.3s ease;
    }

    .socials a:hover {
      background: rgba(0,191,255,0.2);
      transform: translateY(-3px);
      box-shadow: 0 0 15px rgba(0,191,255,0.5);
    }

  </style>
</head>
<body>

  <img src="background.gif" class="video-bg" alt="background">

  <div class="overlay"></div>

  <div class="container">
    <div class="card">

      <img src="avatar.jpg" alt="avatar" class="avatar">

      <h1>Nikito$</h1>

      <p>
        Как говорила одна известная личность: "Всё, что не смывается - съедается. Он НИКОГДА не смывал..."
      </p>

      <div class="socials">
        <a href="https://t.me/nik_fury">TG</a>
      </div>

    </div>
  </div>

</body>
</html>
